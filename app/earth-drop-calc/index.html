<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Calculate and visualize what we can see of a target of a certain size and distance from any observer altitude, taking refraction into account. Compares flat earth and globe earth.">
  <meta name="theme-color" content="#120c24">
  <script>
    /* Set theme before paint (no flash): stored choice, else OS preference. */
    (function () {
      try {
        var t = localStorage.getItem('theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a5276' stroke='%23ccc' stroke-width='2'/%3E%3Cpath d='M50 5 A45 45 0 0 1 95 50' fill='none' stroke='%23fff' stroke-width='1.5' opacity='0.3'/%3E%3C/svg%3E">
  <link rel="manifest" href="../../manifest.webmanifest">
  <link rel="apple-touch-icon" href="../../apple-touch-icon.png">
  <script>if ('serviceWorker' in navigator) addEventListener('load', function () { navigator.serviceWorker.register('../../sw.js'); });</script>
  <title>Advanced Earth Curvature Calculator</title>

  <script>
    var NUMBER_FORMATING = 'en';
    var ROOT = './';
    var ASP_PAGE = 'index.html';
    var ASP_REF = '';
    var PAGE_NAME = 'Advanced Earth Curvature Calculator';
    var PAGE_URL = '';
    var MEDIA_FOLDER = '';
    var WIKIDOC_URL = '';
    var PAGE_MODE = '';
    var MATH_PROCESSOR = 'None';
    var ENABLE_EDIT = false;
    var HAS_FORMS = false;
    var IS_LOGED_IN = false;
    var IS_USER_LOGED_IN = false;
    var WIKI_HiliWordList = [];
  </script>

  <script type="module" src="js/main.js"></script>
</head>

<body>
  <main id="app" class="Wiki">

    <!-- Top bar: WikiTerra branding (injected by appShell.js) + controls -->
    <header id="top-bar">
      <div id="top-controls">
        <button class="pb-btn" id="btn-screenshot" aria-label="Screenshot" title="Save screenshot">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" aria-hidden="true" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
      </div>
    </header>

    <!-- Canvas mount -->
    <div id="jsg-canvas-mount"></div>

    <!-- Panel drawer (slides up from bottom bar) — sections toggle open/close on click -->
    <div id="panel-drawer">
      <div id="panel-drawer-content">
        <!-- Section 1: Measures (all sliders + targets + view) -->
        <div class="drawer-section" data-section="measures">
          <div class="drawer-section-title">📐 Measures</div>
          <div class="drawer-section-body">
            <div class="Scroller Paragraph">
              <div class="ScrollCanvas" id="panel-basics"></div>
            </div>
            <div class="Scroller Paragraph">
              <div class="ScrollCanvas" id="panel-view"></div>
            </div>
            <div class="Scroller Paragraph">
              <div class="ScrollCanvas" id="panel-obj1"></div>
            </div>
          </div>
        </div>

        <!-- Section: View (Model is in the bottom bar; Camera Aim + Show Data here) -->
        <div class="drawer-section" data-section="view">
          <div class="drawer-section-title">👁 View</div>
          <div class="drawer-section-body">
            <div class="Scroller Paragraph">
              <div class="ScrollCanvas" id="panel-options"></div>
            </div>
          </div>
        </div>

        <!-- Section 2: Optics (refraction + atmosphere/barometer) -->
        <div class="drawer-section" data-section="optics">
          <div class="drawer-section-title">🔬 Optics</div>
          <div class="drawer-section-body">
            <div class="Scroller Paragraph">
              <div class="ScrollCanvas" id="panel-refraction"></div>
            </div>
          </div>
        </div>

        <!-- Section 3: Distance Data (target + horizon read-only) -->
        <div class="drawer-section" data-section="data">
          <div class="drawer-section-title">📊 Distance Data</div>
          <div class="drawer-section-body">
            <div class="Scroller Paragraph">
              <div class="ScrollCanvas" id="panel-targetdata"></div>
            </div>
            <div class="Scroller Paragraph">
              <div class="ScrollCanvas" id="panel-horizondata"></div>
            </div>
          </div>
        </div>

        <!-- Section 4: Settings (Units + Save/Restore) -->
        <div class="drawer-section" data-section="settings">
          <div class="drawer-section-title">⚙️ Settings</div>
          <div class="drawer-section-body">
            <div class="Scroller Paragraph">
              <div class="ScrollCanvas" id="panel-units"></div>
            </div>
            <div class="Scroller Paragraph">
              <div class="ScrollCanvas" id="panel-saverestore"></div>
            </div>
          </div>
        </div>
      </div>
      <button id="panel-drawer-close" aria-label="Close panel drawer">▼</button>
    </div>

    <!-- Bottom bar: independent section toggles (Measures, Optics, Data, Units)
         + a separate Model group (FE / Globe) -->
    <footer id="bottom-bar">
        <button class="layer-toggle" data-section="measures" aria-pressed="false" aria-label="Measures">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" aria-hidden="true">
            <line x1="4" y1="4" x2="20" y2="20" />
            <polyline points="4 20 4 4 20 4" />
          </svg>
          <span class="toggle-label">Measures</span>
        </button>
        <button class="layer-toggle" data-section="optics" aria-pressed="false" aria-label="Optics">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" aria-hidden="true">
            <path d="M3 20a9 9 0 0 1 18 0M12 20v-8M7.5 20 11 13M16.5 20 13 13" />
          </svg>
          <span class="toggle-label">Optics</span>
        </button>
        <button class="layer-toggle" data-section="data" aria-pressed="false" aria-label="Distance Data">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" aria-hidden="true">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          </svg>
          <span class="toggle-label">Data</span>
        </button>
        <button class="layer-toggle" data-section="view" aria-pressed="false" aria-label="View options">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <span class="toggle-label">View</span>
        </button>
        <button class="layer-toggle" data-section="settings" id="qs-units" aria-pressed="false" aria-label="Units">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 7h16M4 17h16" />
            <circle cx="9" cy="7" r="2" fill="currentColor" stroke="none" />
            <circle cx="15" cy="17" r="2" fill="currentColor" stroke="none" />
          </svg>
          <span class="toggle-label">Units</span>
        </button>

      <!-- Model selector — separate group: FE / Globe / Both (compare) -->
      <div class="quick-section" role="group" aria-label="Model">
        <button class="layer-toggle" data-prop="ShowModel" data-val="2" aria-pressed="false" id="qs-fe">FE</button>
        <button class="layer-toggle" data-prop="ShowModel" data-val="1" aria-pressed="true" id="qs-globe">Globe</button>
        <button class="layer-toggle" data-prop="ShowModel" data-val="3" aria-pressed="false" id="qs-both">FE+Globe</button>
      </div>
    </footer>

    <!-- Reference images. The TabBoxes/TabHide wrappers are required by Tabs.js
         (it toggles them by index); the inner markup is semantic figure/caption. -->
    <div id="CurveCalcGraphsBoxes" class="TabBoxes">
      <div class="TabHide">
        <figure class="ref-pic">
          <img src="assets/CurveCalcAngles.png" alt="" loading="lazy" decoding="async">
          <figcaption>Curvature Calculator showing Angles</figcaption>
        </figure>
      </div>
      <div>
        <figure class="ref-pic">
          <img src="assets/CurveCalcNoRefraction2.png" alt="" loading="lazy" decoding="async">
          <figcaption>Curvature Calculator showing No Refraction</figcaption>
        </figure>
      </div>
      <div class="TabHide">
        <figure class="ref-pic">
          <img src="assets/CurveCalcRefraction2.png" alt="" loading="lazy" decoding="async">
          <figcaption>Curvature Calculator showing Refraction</figcaption>
        </figure>
      </div>
    </div>

    <!-- Screen reader region -->
    <div id="canvas-status" role="status" aria-live="polite" aria-atomic="true"
      style="position:absolute;width:1px;height:1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">
    </div>

    <!-- Hidden tab bar kept for Tabs.js compatibility -->
    <ul id="CurveSettingsTabs" class="TabSelectors HiddenTabs" hidden>
      <li id="BasicsTab" class="TabEnabled TabSelected">Basics</li>
      <li id="ViewsTab" class="TabEnabled">View</li>
      <li id="Obj1Tab" class="TabEnabled">Target 1</li>
      <li id="Obj2Tab" class="TabEnabled">Target 2</li>
      <li id="RefractionTab" class="TabEnabled">Refraction</li>
      <li id="StdRefrButton" class="TabButton TabEnabled">Std</li>
      <li id="ZeroRefrButton" class="TabButton TabEnabled">0</li>
      <li id="UnitsTab" class="TabEnabled">Units</li>
      <li id="SaveRestoreTab" class="TabEnabled">Save/Restore</li>
      <li id="ResetButton" class="TabButton TabEnabled">Reset All</li>
    </ul>

    <!-- Anchor for DataX -->
    <a id="App"></a>

  </main>
</body>

</html>
